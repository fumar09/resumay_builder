<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="deployment-timestamp" content="2025-05-09T00:00:00Z" />
    <!-- ===== FUMAR DEVELOPMENT BUILD ===== -->
    <!-- Cache buster for Vercel deployment: v2.0 FORCE REBUILD -->
    <!-- This version includes: STOP message with "by Fumar!" signature -->
    <title>ResuMay! - ATS Resume Optimizer</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=Instrument+Sans:wght@400..800&family=Newsreader:opsz,wght@6..72,400..700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=Instrument+Sans:wght@400..800&family=Newsreader:opsz,wght@6..72,400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Disable Developer Tools and Code Copying Protection
      (function() {
        // Disable right-click context menu
        document.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          return false;
        }, true);

        // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C, Ctrl+Shift+K
        document.addEventListener('keydown', (e) => {
          if (
            e.key === 'F12' ||
            (e.ctrlKey && e.shiftKey && e.key === 'I') ||
            (e.ctrlKey && e.shiftKey && e.key === 'J') ||
            (e.ctrlKey && e.shiftKey && e.key === 'C') ||
            (e.ctrlKey && e.shiftKey && e.key === 'K') ||
            (e.ctrlKey && e.key === 's')
          ) {
            e.preventDefault();
            return false;
          }
        }, true);

        // Disable copy on certain elements
        document.addEventListener('copy', (e) => {
          if (e.target.closest('.code-protected')) {
            e.preventDefault();
            return false;
          }
        }, true);

        // DevTools detection with Stop message
        const detectDevTools = () => {
          const threshold = 160;
          if (window.outerHeight - window.innerHeight > threshold) {
            const stopMessage = '%c%cSTOP!%c\nDeveloper tools access is restricted by Fumar!';
            console.log(
              stopMessage,
              'font-size: 20px; color: red; font-weight: bold;',
              'font-size: 40px; color: red; font-weight: bold; text-shadow: 2px 2px 0 rgba(0,0,0,0.5);',
              'font-size: 16px; color: red;'
            );
            console.warn('%cThis action is not allowed.', 'color: red; font-weight: bold;');
          }
        };
        
        window.addEventListener('resize', detectDevTools);
        setInterval(detectDevTools, 500);

        // Show initial Stop message
        setTimeout(() => {
          const stopMessage = '%c%cSTOP!%c\nDeveloper tools access is restricted by Fumar!';
          console.log(
            stopMessage,
            'font-size: 20px; color: red; font-weight: bold;',
            'font-size: 40px; color: red; font-weight: bold;',
            'font-size: 14px; color: red;'
          );
        }, 100);

        // Don't override console - just detect
      })();

      // Prevent uncaught promise rejections from audio/video
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason?.name === 'AbortError' || event.reason?.name === 'NotAllowedError') {
          event.preventDefault();
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
