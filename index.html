<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResuMay! - ATS Resume Optimizer</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="shortcut icon" href="./favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=Instrument+Sans:wght@400..800&family=Newsreader:opsz,wght@6..72,400..700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=Instrument+Sans:wght@400..800&family=Newsreader:opsz,wght@6..72,400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Disable Developer Tools and Code Copying Protection
      (function() {
        // Disable right-click context menu
        document.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          return false;
        }, true);

        // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C, Ctrl+Shift+K
        document.addEventListener('keydown', (e) => {
          if (
            e.key === 'F12' ||
            (e.ctrlKey && e.shiftKey && e.key === 'I') ||
            (e.ctrlKey && e.shiftKey && e.key === 'J') ||
            (e.ctrlKey && e.shiftKey && e.key === 'C') ||
            (e.ctrlKey && e.shiftKey && e.key === 'K') ||
            (e.ctrlKey && e.key === 's')
          ) {
            e.preventDefault();
            return false;
          }
        }, true);

        // Disable copy on certain elements
        document.addEventListener('copy', (e) => {
          if (e.target.closest('.code-protected')) {
            e.preventDefault();
            return false;
          }
        }, true);

        // DevTools detection
        const detectDevTools = () => {
          const threshold = 160;
          if (window.outerHeight - window.innerHeight > threshold) {
            console.warn('Developer Tools detected. This action is not allowed.');
          }
        };
        
        window.addEventListener('resize', detectDevTools);
        setInterval(detectDevTools, 500);

        // Disable console access
        Object.defineProperty(window, 'console', {
          value: {
            log: () => null,
            warn: () => null,
            error: () => null,
            debug: () => null,
            info: () => null
          },
          writable: false
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
