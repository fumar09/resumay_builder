<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResuMay! - ATS Resume Optimizer</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="shortcut icon" href="./favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=Instrument+Sans:wght@400..800&family=Newsreader:opsz,wght@6..72,400..700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=Instrument+Sans:wght@400..800&family=Newsreader:opsz,wght@6..72,400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Disable right-click context menu
      document.addEventListener('contextmenu', (e) => e.preventDefault());
      
      // Disable developer tools keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        // F12 - Developer Tools
        if (e.key === 'F12') e.preventDefault();
        // Ctrl+Shift+I - Inspector
        if (e.ctrlKey && e.shiftKey && e.key === 'I') e.preventDefault();
        // Ctrl+Shift+J - Console
        if (e.ctrlKey && e.shiftKey && e.key === 'J') e.preventDefault();
        // Ctrl+Shift+C - Element Inspector
        if (e.ctrlKey && e.shiftKey && e.key === 'C') e.preventDefault();
        // Ctrl+Shift+K - Console (Firefox)
        if (e.ctrlKey && e.shiftKey && e.key === 'K') e.preventDefault();
        // Ctrl+Shift+M - Responsive Design Mode
        if (e.ctrlKey && e.shiftKey && e.key === 'M') e.preventDefault();
      });
      
      // Detect if DevTools is open
      let devtools = { open: false };
      const threshold = 160;
      setInterval(() => {
        if (window.outerHeight - window.innerHeight > threshold || window.outerWidth - window.innerWidth > threshold) {
          if (!devtools.open) {
            devtools.open = true;
            console.clear();
            console.log('%c⚠️ Developer Tools Disabled', 'color: red; font-size: 16px; font-weight: bold;');
            console.log('%cThis application is protected from inspection.', 'color: red;');
          }
        } else {
          devtools.open = false;
        }
      }, 500);
      
      // Disable copy/paste on sensitive elements
      document.addEventListener('copy', (e) => {
        const selection = window.getSelection();
        if (selection && selection.toString().length > 100) {
          e.preventDefault();
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
